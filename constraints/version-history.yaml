# constraints/version-history.yaml
# 版本历史只追加不覆盖约束

id: version-history
name: 版本历史只追加不覆盖
name_en: Version History Append-Only Rule
priority: critical
severity: violation

# 约束来源
source:
  - 有声漫画-Skills-全景图.md v1.4 (2026-04-26)
  - heartbeat-rules.md: "优先追加、整理，不重写"

# 适用文件类型
applies_to:
  - "*.md"  # 所有 Markdown 文件
  - "SKILL.md"
  - "TASK_*.md"
  - "heartbeat-state.md"
  - "*.md.bak"  # 备份文件也遵循

# 不适用
excludes:
  - "_compiled/*.md"  # 编译产物，可覆盖
  - "_distillation/*"  # 蒸馏产物，可覆盖

# 检查逻辑
check_logic:
  summary: |
    如果目标文件包含 ## 版本历史 或 ## Changelog
    则 new_content 必须满足：
    1. 新版本号 > 现有最大版本号
    2. 不得删除任何历史版本块
    3. 不得修改任何历史版本块的内容
    4. 版本块格式必须遵循倒序排列（最新在上）
    
  technical: |
    # 版本号检测正则
    VERSION_PATTERN: "^###?\\s+v(\\d+\\.\\d+)"
    
    # 版本块结构
    VERSION_BLOCK: |
      ### v{X}.{Y} ({DATE})
      
      **变更**：
      - 变更内容...
      
      ### v{X}.{Y-1} ({DATE})
      ...

# 违规处理
violation_action:
  - 拒绝执行 Edit/Write 操作
  - 输出约束提示
  - 建议正确做法：追加新版本块而非覆盖

# 错误范例关联
fail_cases:
  - FC006: Edit 工具尝试覆盖版本历史（2026-04-30）

# 相关约束
related:
  - C19  # 发现违规→记录并修复
  - C23  # 补技能不补约束

# 版本历史
version_history:
  - v1.0 (2026-04-30): 初始版本，约束元数据库建立
